<!DOCTYPE html>
<html>
<head>
  <title>Fortune AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="font-family: Arial, sans-serif; max-width: 760px; margin: 30px auto; padding: 0 16px; background: #fafafa;">

  <h2>Fortune AI</h2>

  <p style="color:#555;">
    Ask your question + lot number (1–100)
  </p>

  <div id="chat" style="margin:20px 0;"></div>

  <textarea id="question" rows="4" placeholder="Type your question..."
    style="width:100%; padding:12px; border-radius:10px;"></textarea>

  <br><br>

  <button id="askBtn">Ask</button>
  <button id="clearBtn">New Reading</button>

  <p id="remaining"></p>

  <!-- PAYMENT BOX -->
  <div id="paymentBox" style="display:none; margin-top:20px; padding:16px; border:1px solid #ccc; border-radius:12px; background:white;">

    <h3>Limit reached</h3>

    <p>Unlock more questions:</p>

    <div style="display:flex; gap:20px;">

      <div style="text-align:center;">
        <p>PayNow</p>
        <img src="/paynow-qr" width="160">
      </div>

      <div style="text-align:center;">
        <p>PayLah</p>
        <img src="/paylah-qr" width="160">
      </div>

    </div>

    <button onclick="unlockQuestions()" style="margin-top:15px;">
      I have paid
    </button>

  </div>

<script>

let sessionId = localStorage.getItem("session_id");

if (!sessionId || sessionId === "null") {
  sessionId = null;
}

function appendMessage(sender, text) {
  const chat = document.getElementById("chat");

  const div = document.createElement("div");
  div.style.marginBottom = "10px";
  div.innerText = sender + ": " + text;

  chat.appendChild(div);
}

function clearChat() {
  document.getElementById("chat").innerHTML = "";
  document.getElementById("paymentBox").style.display = "none";
}

async function askQuestion() {

  const q = document.getElementById("question").value.trim();
  if (!q) return;

  appendMessage("You", q);

  const res = await fetch("/ask", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      question: q,
      session_id: sessionId
    })
  });

  const data = await res.json();

  if (data.session_id) {
    sessionId = data.session_id;
    localStorage.setItem("session_id", sessionId);
  }

  if (data.ok) {
    appendMessage("AI", data.answer);
    document.getElementById("remaining").innerText =
      "Remaining: " + data.remaining;
    document.getElementById("paymentBox").style.display = "none";
  } else {
    appendMessage("AI", data.message);
    document.getElementById("paymentBox").style.display = "block";
  }
}

async function unlockQuestions() {

  const res = await fetch("/unlock", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      session_id: sessionId
    })
  });

  const data = await res.json();

  if (data.ok) {
    alert("Unlocked 10 questions ✨");
    document.getElementById("paymentBox").style.display = "none";
  }
}

document.getElementById("askBtn").onclick = askQuestion;
document.getElementById("clearBtn").onclick = clearChat;

</script>

</body>
</html>
